# ---------------------------------------------------------------------------
# Plugin coordinates
# ---------------------------------------------------------------------------
pluginGroup = dev.anchorwindows
pluginName = anchor-windows
pluginVersion = 0.2.5

# Plugin compatibility range (Rider build numbers). 261 = 2026.1.x
pluginSinceBuild = 261
pluginUntilBuild = 261.*

# ---------------------------------------------------------------------------
# Target platform — Rider (the plugin is frontend-only and platform-generic,
# but we compile against the same SDK that runs it).
# ---------------------------------------------------------------------------
platformType = RD
platformVersion = 2026.1.3

# ---------------------------------------------------------------------------
# Gradle
# ---------------------------------------------------------------------------
org.gradle.jvmargs = -Xmx4g -XX:+UseParallelGC
org.gradle.configuration-cache = false
org.gradle.caching = true
# The IDE provides the Kotlin stdlib at runtime; do not bundle our own.
kotlin.stdlib.default.dependency = false
